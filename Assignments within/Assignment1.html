<script>
  // Function to shuffle and display a random suggestion
  function shuffleSuggestion() {
    // Pick a random index from the array

    // Update the text inside the span
    document.getElementById("you-might-wanna").textContent = "You might wanna " + youMightWanna[randomIndex];

  // Add click event listener to the button
  document.getElementById("shuffle-btn").addEventListener("click", shuffleSuggestion);
